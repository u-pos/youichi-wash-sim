<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ウォッシュ</title>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
  touch-action:none;
  color:#fff;
}

.hud{
  width:360px;
  padding:6px;
}
#barWrap{
  width:100%;
  height:8px;
  background:#333;
}
#bar{
  height:100%;
  width:100%;
  background:#4fc3f7;
}

#percent{
  font-size:14px;
  margin-bottom:4px;
}

.game{
  position:relative;
  width:360px;
  aspect-ratio:3/4;
}

.game img,.game canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
}

#hose{
  position:absolute;
  width:320px;
  left:80px;
  top:100px;
  z-index:4;
}

#clearImg{
  z-index:5;
  display:none;
}

#restartBtn{
  position:absolute;
  bottom:-60px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  font-size:16px;
  background:#fff;
  color:#000;
  border:none;
  border-radius:8px;
  display:none;
}

.controls{
  position:absolute;
  top:10px;
  right:10px;
  z-index:999;
  display:flex;
  gap:5px;
}
</style>
</head>

<body>

<div class="hud">
  <div id="percent">残り 100%</div>
  <div id="barWrap"><div id="bar"></div></div>
</div>

<div class="game" id="game">
  <img src="bg.png">
  <img src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="clearImg" src="missionclear.png">
  <img id="hose" src="hoseA.png">

  <div class="controls">
    <button onclick="flipY()">上下</button>
    <button onclick="flipX()">左右</button>
  </div>

  <button id="restartBtn" onclick="restart()">再度きれいにする</button>
</div>

<script>
const game=document.getElementById("game");
const dirt=document.getElementById("dirt");
const spray=document.getElementById("spray");
const hose=document.getElementById("hose");
const bar=document.getElementById("bar");
const percent=document.getElementById("percent");
const clearImg=document.getElementById("clearImg");
const restartBtn=document.getElementById("restartBtn");

const dCtx=dirt.getContext("2d");
const sCtx=spray.getContext("2d");

let isDown=false;
let flipXFlag=false;
let flipYFlag=false;
let finished=false;

const GRIP_X=0.48;
const GRIP_Y=0.42;
const NOZZLE_X=0.08;
const NOZZLE_Y=0.08;

const img=new Image();
img.src="before.png";

/* ★ここが重要修正 */
img.onload=()=>{
  const rect = game.getBoundingClientRect();

  dirt.width = rect.width;
  dirt.height = rect.height;
  spray.width = rect.width;
  spray.height = rect.height;

  dCtx.drawImage(img,0,0,rect.width,rect.height);
};

function getNozzle(){
  const rect=hose.getBoundingClientRect();
  const gRect=game.getBoundingClientRect();

  let nx=rect.width*NOZZLE_X;
  let ny=rect.height*NOZZLE_Y;

  if(flipXFlag) nx=rect.width-nx;
  if(flipYFlag) ny=rect.height-ny;

  let gx=rect.left-gRect.left+nx;
  let gy=rect.top -gRect.top +ny;

  return { x:gx, y:gy }; // ★変換しない
}

function sprayAll(){
  const n=getNozzle();

  sCtx.clearRect(0,0,spray.width,spray.height);

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  let dx=flipXFlag?1:-1;
  let dy=flipYFlag?1:-1;

  let len=Math.sqrt(dx*dx+dy*dy);
  dx/=len; dy/=len;

  for(let i=0;i<100;i++){
    let spread=(Math.random()-0.5)*0.4;

    let sx=-dy*spread;
    let sy=dx*spread;

    let vx=dx+sx;
    let vy=dy+sy;

    let dist=Math.random()*200;

    let x=n.x+vx*dist;
    let y=n.y+vy*dist;

    sCtx.fillStyle="rgba(255,255,255,0.35)";
    sCtx.fillRect(x,y,2,6);

    dCtx.beginPath();
    dCtx.arc(x,y,12,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();

  updateProgress();
}

function updateProgress(){
  const data=dCtx.getImageData(0,0,dirt.width,dirt.height).data;

  let total=data.length/4;
  let remain=0;

  for(let i=3;i<data.length;i+=4){
    if(data[i]>0) remain++;
  }

  let percentVal=Math.floor(remain/total*100);

  bar.style.width=percentVal+"%";
  percent.innerText="残り "+percentVal+"%";

  if(percentVal<=1 && !finished){
    finished=true;
    clearImg.style.display="block";
    restartBtn.style.display="block";
  }
}

function moveHose(x,y){
  const gRect=game.getBoundingClientRect();
  const rect=hose.getBoundingClientRect();

  hose.style.left=(x-gRect.left-rect.width*GRIP_X)+"px";
  hose.style.top =(y-gRect.top -rect.height*GRIP_Y)+"px";
}

function applyTransform(){
  hose.style.transform=
    `scaleX(${flipXFlag?-1:1}) scaleY(${flipYFlag?-1:1})`;
}
function flipX(){ flipXFlag=!flipXFlag; applyTransform(); }
function flipY(){ flipYFlag=!flipYFlag; applyTransform(); }

window.addEventListener("pointerdown",e=>{
  if(finished) return;
  isDown=true;
});

window.addEventListener("pointerup",()=>{
  isDown=false;
});

window.addEventListener("pointermove",e=>{
  if(!isDown || finished) return;
  moveHose(e.clientX,e.clientY);
  sprayAll();
});

function restart(){
  const rect = game.getBoundingClientRect();
  dCtx.clearRect(0,0,dirt.width,dirt.height);
  dCtx.drawImage(img,0,0,rect.width,rect.height);

  bar.style.width="100%";
  percent.innerText="残り 100%";

  clearImg.style.display="none";
  restartBtn.style.display="none";

  finished=false;
}
</script>

</body>
</html>
