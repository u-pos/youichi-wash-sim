<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  touch-action:none;
}

.game{
  position:relative;
  width:360px;
  aspect-ratio:3/4;
}

.game img,.game canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
}

#hose{
  position:absolute;
  width:320px;
  transform-origin:62% 58%; /* ★グリップ */
}

.flipBtn{
  position:absolute;
  top:10px;
  right:10px;
  z-index:10;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="hose" src="hoseA.png">

  <button class="flipBtn" onclick="flip()">反転</button>
</div>

<audio id="waterSound" src="water.wav" loop></audio>

<script>
const dirt=document.getElementById("dirt");
const spray=document.getElementById("spray");
const clean=document.getElementById("clean");
const hose=document.getElementById("hose");
const sound=document.getElementById("waterSound");

const dCtx=dirt.getContext("2d");
const sCtx=spray.getContext("2d");

let isDown=false;
let angle=0;

/* ★画像ローカル座標 */
const GRIP_X=0.62;
const GRIP_Y=0.58;

const NOZZLE_X=0.14;
const NOZZLE_Y=0.10;

const dirtImg=new Image();
dirtImg.src="before.png";

/* 初期化 */
function init(){
  const w=clean.naturalWidth;
  const h=clean.naturalHeight;
  dirt.width=w;
  dirt.height=h;
  spray.width=w;
  spray.height=h;
  dCtx.drawImage(dirtImg,0,0,w,h);
}

let loaded=0;
function ready(){
  loaded++;
  if(loaded===2) init();
}
clean.onload=ready;
dirtImg.onload=ready;

/* 座標変換 */
function domToCanvas(x,y){
  const rect=dirt.getBoundingClientRect();
  return{
    x:(x-rect.left)*(dirt.width/rect.width),
    y:(y-rect.top)*(dirt.height/rect.height)
  };
}

/* ★グリップの画面座標 */
function getGrip(){
  const rect=hose.getBoundingClientRect();
  return{
    x:rect.left + rect.width*GRIP_X,
    y:rect.top  + rect.height*GRIP_Y
  };
}

/* ★ノズル（回転込み） */
function getNozzle(){

  const rect=hose.getBoundingClientRect();

  const gx = rect.left + rect.width * GRIP_X;
  const gy = rect.top  + rect.height * GRIP_Y;

  const nx = rect.left + rect.width * NOZZLE_X;
  const ny = rect.top  + rect.height * NOZZLE_Y;

  let dx = nx - gx;
  let dy = ny - gy;

  // ★回転適用
  let rx = dx * Math.cos(angle) - dy * Math.sin(angle);
  let ry = dx * Math.sin(angle) + dy * Math.cos(angle);

  return domToCanvas(gx + rx, gy + ry);
}

/* 水 */
function sprayAll(){

  const n=getNozzle();

  sCtx.clearRect(0,0,spray.width,spray.height);

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  let baseDX = Math.cos(angle - Math.PI/4);
  let baseDY = Math.sin(angle - Math.PI/4);

  for(let i=0;i<120;i++){

    let spread=(Math.random()-0.5)*0.5;

    let sx = -baseDY * spread;
    let sy = baseDX * spread;

    let dx = baseDX + sx;
    let dy = baseDY + sy;

    let dist=Math.random()*220;

    let x=n.x + dx*dist;
    let y=n.y + dy*dist;

    sCtx.fillStyle="rgba(255,255,255,0.35)";
    sCtx.fillRect(x,y,2,6);

    dCtx.beginPath();
    dCtx.arc(x,y,12,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();
}

/* 吸着 */
function updateHose(x,y){

  const w=hose.offsetWidth;
  const h=hose.offsetHeight;

  const gx=w*GRIP_X;
  const gy=h*GRIP_Y;

  hose.style.left=(x-gx)+"px";
  hose.style.top =(y-gy)+"px";
}

/* ★180度回転（中心＝グリップ） */
function flip(){
  angle += Math.PI;
  hose.style.transform = `rotate(${angle}rad)`;
}

/* 操作 */
dirt.addEventListener("pointerdown",(e)=>{
  isDown=true;
  sound.currentTime=0;
  sound.play();
});

window.addEventListener("pointerup",()=>{
  isDown=false;
  sound.pause();
});

dirt.addEventListener("pointermove",(e)=>{
  if(!isDown) return;

  updateHose(e.clientX,e.clientY);
  sprayAll();
});
</script>
</body>
</html>
