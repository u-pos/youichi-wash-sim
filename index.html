<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ウォッシュ</title>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

canvas{
  width:360px;
  aspect-ratio:3/4;
  touch-action:none;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const beforeImg = new Image();
const cleanImg = new Image();
const clearImg = new Image();

beforeImg.src = "before.png";
cleanImg.src = "clean.png";
clearImg.src = "missionclear.png";

let loaded = 0;
[beforeImg, cleanImg, clearImg].forEach(img=>{
  img.onload = ()=>{
    loaded++;
    if(loaded===3) init();
  };
});

let w, h;
let finished=false;

function init(){
  w = beforeImg.width;
  h = beforeImg.height;

  canvas.width = w;
  canvas.height = h;

  draw();
}

function draw(){

  ctx.clearRect(0,0,w,h);

  // 背景
  ctx.drawImage(cleanImg,0,0,w,h);

  // 汚れ
  ctx.globalCompositeOperation="source-over";
  ctx.drawImage(beforeImg,0,0,w,h);

  // クリア時
  if(finished){
    ctx.drawImage(clearImg,0,0,w,h);
  }
}

/* 擬似削り */
function cleanAt(x,y){

  ctx.globalCompositeOperation="destination-out";

  for(let i=0;i<20;i++){
    let dx = (Math.random()-0.5)*40;
    let dy = (Math.random()-0.5)*40;

    ctx.beginPath();
    ctx.arc(x+dx,y+dy,15,0,Math.PI*2);
    ctx.fill();
  }

  ctx.globalCompositeOperation="source-over";
}

/* タッチ */
let isDown=false;

canvas.addEventListener("pointerdown",()=>{
  if(finished) return;
  isDown=true;
});

window.addEventListener("pointerup",()=>{
  isDown=false;
});

canvas.addEventListener("pointermove",e=>{
  if(!isDown || finished) return;

  const rect = canvas.getBoundingClientRect();

  let x = (e.clientX - rect.left)*(w/rect.width);
  let y = (e.clientY - rect.top)*(h/rect.height);

  cleanAt(x,y);
  draw();

  checkClear();
});

/* クリア判定 */
function checkClear(){

  const data = ctx.getImageData(0,0,w,h).data;

  let remain=0;

  for(let i=3;i<data.length;i+=4){
    if(data[i]>10) remain++;
  }

  if(remain < data.length/4*0.02){
    finished=true;
    draw();
  }
}
</script>

</body>
</html>
