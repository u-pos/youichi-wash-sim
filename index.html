<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  touch-action:none;
}

.game{
  position:relative;
  width:360px;
  aspect-ratio:3/4;
}

.game img,.game canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
}

#bg{z-index:0;}
#clean{z-index:1;}
#dirt{z-index:2;}
#spray{z-index:3;}

#hose{
  z-index:4;
  width:300px; /* ←元サイズに戻した */
  position:absolute;
  object-fit:contain;

  left:80px;
  top:100px;
}

.flipBtn{
  position:absolute;
  top:10px;
  right:10px;
  z-index:10;
  padding:10px 15px;
  background:#222;
  color:#fff;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="hose" src="hoseA.png">

  <button class="flipBtn" onclick="flip()">反転</button>
</div>

<audio id="waterSound" src="water.wav" loop></audio>

<script>
const dirt=document.getElementById("dirt");
const spray=document.getElementById("spray");
const clean=document.getElementById("clean");
const hose=document.getElementById("hose");
const sound=document.getElementById("waterSound");

const dCtx=dirt.getContext("2d");
const sCtx=spray.getContext("2d");

let isDown=false;
let flipped=false;

/* ★ここが最重要（画像基準） */
const GRIP_X=0.62;
const GRIP_Y=0.58;

const NOZZLE_X=0.12; // 赤丸位置に合わせて調整済み
const NOZZLE_Y=0.08;

const dirtImg=new Image();
dirtImg.src="before.png";

/* 初期化 */
function init(){
  const w=clean.naturalWidth;
  const h=clean.naturalHeight;
  dirt.width=w;
  dirt.height=h;
  spray.width=w;
  spray.height=h;
  dCtx.drawImage(dirtImg,0,0,w,h);
}

let loaded=0;
function ready(){
  loaded++;
  if(loaded===2) init();
}
clean.onload=ready;
dirtImg.onload=ready;

/* DOM→Canvas */
function domToCanvas(x,y){
  const rect=dirt.getBoundingClientRect();
  return{
    x:(x-rect.left)*(dirt.width/rect.width),
    y:(y-rect.top)*(dirt.height/rect.height)
  };
}

/* ノズル（完全固定） */
function getNozzle(){

  const rect=hose.getBoundingClientRect();

  const x = rect.left + rect.width * NOZZLE_X;
  const y = rect.top  + rect.height * NOZZLE_Y;

  return domToCanvas(x,y);
}

/* 水＋削り（統一） */
function sprayAll(){

  const n=getNozzle();

  sCtx.clearRect(0,0,spray.width,spray.height);

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  /* ★方向（画像軸ベース） */
  let baseDX = -1;        // 左
  let baseDY = flipped ? 1 : -1;  // 上 or 下

  let len = Math.sqrt(baseDX*baseDX + baseDY*baseDY);
  baseDX/=len;
  baseDY/=len;

  for(let i=0;i<130;i++){

    let spread=(Math.random()-0.5)*0.5;

    let sx = -baseDY * spread;
    let sy = baseDX * spread;

    let dx = baseDX + sx;
    let dy = baseDY + sy;

    let dist=Math.random()*220;

    let x=n.x + dx*dist;
    let y=n.y + dy*dist;

    /* 水 */
    sCtx.fillStyle="rgba(255,255,255,0.35)";
    sCtx.fillRect(x,y,2,6);

    /* 削り */
    dCtx.beginPath();
    dCtx.arc(x,y,12,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();
}

/* 吸着（完全固定） */
function updateHose(x,y){
  const w=hose.offsetWidth;
  const h=hose.offsetHeight;

  const gx=w*GRIP_X;
  const gy=h*GRIP_Y;

  hose.style.left=(x-gx)+"px";
  hose.style.top =(y-gy)+"px";
}

/* 反転 */
function flip(){
  flipped=!flipped;
  hose.style.transform = flipped ? "scaleY(-1)" : "scaleY(1)";
}

/* 操作 */
dirt.addEventListener("pointerdown",(e)=>{
  isDown=true;
  sound.currentTime=0;
  sound.play();
});

window.addEventListener("pointerup",()=>{
  isDown=false;
  sound.pause();
});

dirt.addEventListener("pointermove",(e)=>{
  if(!isDown) return;

  updateHose(e.clientX,e.clientY);
  sprayAll();
});
</script>

</body>
</html>
