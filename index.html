<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  touch-action:none;
}

.game{
  position:relative;
  width:360px;
  aspect-ratio:3/4;
}

.game img,.game canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
}

#bg{z-index:0; pointer-events:none;}
#clean{z-index:1; pointer-events:none;}
#dirt{z-index:2;}
#spray{z-index:3; pointer-events:none;}
#hose{
  z-index:4;
  width:80%;
  position:absolute;
  pointer-events:none;
  left: 80px;  /* ←右に移動 */
  top: 80px;   /* ←下に移動 */
}

canvas{touch-action:none;}

#progress{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  height:10px;
  background:#333;
}
#bar{
  height:100%;
  width:0%;
  background:#4fc3f7;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="hose" src="hose.png">
  <div id="progress"><div id="bar"></div></div>
</div>

<audio id="waterSound" src="water.wav" loop></audio>

<script>
const dirt=document.getElementById("dirt");
const spray=document.getElementById("spray");
const clean=document.getElementById("clean");
const hose=document.getElementById("hose");
const bar=document.getElementById("bar");
const sound=document.getElementById("waterSound");

const dCtx=dirt.getContext("2d");
const sCtx=spray.getContext("2d");

let isDown=false;
let angle=0;

const GRIP_X=0.78;
const GRIP_Y=0.58;
const NOZZLE_DIST=170; // ←ここ少し伸ばす

const dirtImg=new Image();
dirtImg.src="before.png";

/* 初期化 */
function init(){
  const w=clean.naturalWidth;
  const h=clean.naturalHeight;
  dirt.width=w;
  dirt.height=h;
  spray.width=w;
  spray.height=h;
  dCtx.drawImage(dirtImg,0,0,w,h);
}

let loaded=0;
function ready(){
  loaded++;
  if(loaded===2) init();
}
clean.onload=ready;
dirtImg.onload=ready;

/* DOM→Canvas */
function domToCanvas(x,y){
  const rect=dirt.getBoundingClientRect();
  return{
    x:(x-rect.left)*(dirt.width/rect.width),
    y:(y-rect.top)*(dirt.height/rect.height)
  };
}

/* ノズル */
function getNozzle(){
  const grip = getGripDom();
  const rect = dirt.getBoundingClientRect();

  // グリップをcanvas座標へ
  let gx = (grip.x - rect.left) * (dirt.width/rect.width);
  let gy = (grip.y - rect.top) * (dirt.height/rect.height);

  // ★回転付きオフセット
  let nx = gx + (NOZZLE_OFFSET_X * Math.cos(angle) - NOZZLE_OFFSET_Y * Math.sin(angle));
  let ny = gy + (NOZZLE_OFFSET_X * Math.sin(angle) + NOZZLE_OFFSET_Y * Math.cos(angle));

  return {x:nx, y:ny};
}

/* 水＋削り（統合） */
function sprayAll(){
  const n=getNozzle();

  sCtx.clearRect(0,0,spray.width,spray.height);

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  for(let i=0;i<140;i++){

    let spread=(Math.random()-0.5)*0.35;
    let dir=angle+spread;

    let dist=Math.random()*260;

    let x=n.x + Math.cos(dir)*dist;
    let y=n.y + Math.sin(dir)*dist;

    // ★水表示
    sCtx.fillStyle="rgba(255,255,255,0.35)";
    sCtx.fillRect(x,y,2,6);

    // ★削り（同じ位置）
    dCtx.beginPath();
    dCtx.arc(x,y,12,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();
}

/* 進捗 */
function updateProgress(){
  const data=dCtx.getImageData(0,0,dirt.width,dirt.height).data;
  let total=data.length/4;
  let clear=0;

  for(let i=3;i<data.length;i+=4){
    if(data[i]===0) clear++;
  }

  bar.style.width=Math.floor(clear/total*100)+"%";
}

/* ホース */
let prevX = 0;
let prevY = 0;

function updateHose(x,y){

  const rect=hose.getBoundingClientRect();
  const gx=rect.width*GRIP_X;
  const gy=rect.height*GRIP_Y;

  // 吸着
  hose.style.left=(x-gx)+"px";
  hose.style.top =(y-gy)+"px";

  // ★ここ修正（移動方向で角度決定）
  let dx = x - prevX;
  let dy = y - prevY;

  if(dx !== 0 || dy !== 0){
    angle = Math.atan2(dy, dx);
  }

  hose.style.transform=`rotate(${angle*180/Math.PI}deg)`;

  prevX = x;
  prevY = y;
}

/* pointer */
dirt.addEventListener("pointerdown",(e)=>{
  isDown=true;
  sound.currentTime=0;
  sound.play();
});

window.addEventListener("pointerup",()=>{
  isDown=false;
  sound.pause();
});

dirt.addEventListener("pointermove",(e)=>{
  if(!isDown) return;

  updateHose(e.clientX,e.clientY);
  sprayAll();
  updateProgress();
});
</script>
</body>
</html>
