<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* レイヤー */
.game {
  position: relative;
  width: 360px;
  aspect-ratio: 3 / 4;
}

.game img,
.game canvas {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
}

/* タッチ制御 */
#bg, #clean { pointer-events: none; }
#spray { pointer-events: none; }
canvas { touch-action: none; }

/* 表示順 */
#bg { z-index: 0; }
#clean { z-index: 1; }
#dirt { z-index: 2; }
#spray { z-index: 3; }
#progress { z-index: 4; }

/* 進捗バー */
#progress {
  position: absolute;
  bottom: 10px;
  left: 10px;
  right: 10px;
  height: 10px;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
}
#bar {
  height: 100%;
  width: 0%;
  background: #4fc3f7;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>

  <div id="progress"><div id="bar"></div></div>
</div>

<audio id="waterSound" src="water.mp3" preload="auto" loop></audio>

<script>
const dirt = document.getElementById("dirt");
const spray = document.getElementById("spray");
const clean = document.getElementById("clean");
const bar = document.getElementById("bar");
const waterSound = document.getElementById("waterSound");

const dCtx = dirt.getContext("2d");
const sCtx = spray.getContext("2d");

let isDown = false;
let radius = 25;
let offsetX = 20;
let offsetY = 20;

/* 汚れ画像 */
const dirtImg = new Image();
dirtImg.src = "before.png";

/* 初期化 */
function init() {
  const w = clean.naturalWidth;
  const h = clean.naturalHeight;

  dirt.width = w;
  dirt.height = h;
  spray.width = w;
  spray.height = h;

  dCtx.clearRect(0,0,w,h);
  dCtx.drawImage(dirtImg, 0, 0, w, h);
}

/* 両方読み込み後 */
let loaded = 0;
function ready() {
  loaded++;
  if (loaded === 2) init();
}
clean.onload = ready;
dirtImg.onload = ready;

/* 座標取得 */
function getPos(e) {
  const rect = dirt.getBoundingClientRect();
  let x = (e.touches[0].clientX - rect.left) * (dirt.width / rect.width);
  let y = (e.touches[0].clientY - rect.top) * (dirt.height / rect.height);
  return {x,y};
}

/* 削る */
function erase(x, y) {
  dCtx.save();
  dCtx.globalCompositeOperation = "destination-out";
  dCtx.beginPath();
  dCtx.arc(x + offsetX, y + offsetY, radius, 0, Math.PI * 2);
  dCtx.fill();
  dCtx.restore();
}

/* 水エフェクト */
function drawSpray(x, y) {
  sCtx.clearRect(0,0,spray.width,spray.height);

  let sx = x + offsetX;
  let sy = y + offsetY;

  let g = sCtx.createRadialGradient(sx, sy, 0, sx, sy, radius);
  g.addColorStop(0, "rgba(255,255,255,0.6)");
  g.addColorStop(1, "rgba(255,255,255,0)");

  sCtx.fillStyle = g;
  sCtx.beginPath();
  sCtx.arc(sx, sy, radius, 0, Math.PI * 2);
  sCtx.fill();
}

/* 進捗 */
function updateProgress() {
  const pixels = dCtx.getImageData(0, 0, dirt.width, dirt.height).data;
  let total = pixels.length / 4;
  let clear = 0;

  for (let i = 3; i < pixels.length; i += 4) {
    if (pixels[i] === 0) clear++;
  }

  let percent = Math.floor((clear / total) * 100);
  bar.style.width = percent + "%";

  if (percent > 95) {
    alert("洗浄完了！");
  }
}

/* 音 */
function startSound() {
  waterSound.currentTime = 0;
  waterSound.play();
}
function stopSound() {
  waterSound.pause();
}

/* タッチ操作 */
dirt.addEventListener("touchstart", (e) => {
  isDown = true;
  startSound();
}, { passive:false });

dirt.addEventListener("touchend", () => {
  isDown = false;
  stopSound();
});

dirt.addEventListener("touchmove", (e) => {
  e.preventDefault();
  if (!isDown) return;

  let {x,y} = getPos(e);

  erase(x,y);
  drawSpray(x,y);
  updateProgress();
}, { passive:false });

</script>

</body>
</html>
