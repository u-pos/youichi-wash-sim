<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ウォッシュ</title>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
  touch-action:none;
  color:#fff;
}

/* HUD */
.hud{
  width:360px;
  padding:6px;
  font-size:14px;
}
#barWrap{
  width:100%;
  height:8px;
  background:#333;
}
#bar{
  height:100%;
  width:100%;
  background:#4fc3f7;
}

.game{
  position:relative;
  width:360px;
  aspect-ratio:3/4;
}

/* ★ここが重要 */
.game img,.game canvas{
  position:absolute;
  top:0;left:0;
  width:100%;
  height:100%;
  object-fit:contain; /* ← cover禁止 */
}

#hose{
  position:absolute;
  width:320px;
  left:80px;
  top:100px;
  z-index:4;
}

.controls{
  position:absolute;
  top:10px;
  right:10px;
  z-index:999;
  display:flex;
  gap:5px;
}
</style>
</head>

<body>

<div class="hud">
  <div id="percent">残り 100%</div>
  <div id="barWrap"><div id="bar"></div></div>
</div>

<div class="game" id="game">
  <img src="bg.png">
  <img src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="hose" src="hoseA.png">

  <div class="controls">
    <button onclick="flipY()">上下</button>
    <button onclick="flipX()">左右</button>
  </div>
</div>

<script>
/* ===== 音（確実に鳴る版） ===== */
/* ===== 音（修正版）ここから ===== */
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let buffer = null;
let source = null;

/* ★ページ読み込み時に1回だけロード */
window.addEventListener("load", async ()=>{
  const res = await fetch("water.wav");
  const arr = await res.arrayBuffer();
  buffer = await audioCtx.decodeAudioData(arr);
});

/* 再生 */
async function startSound(){

  if(audioCtx.state === "suspended"){
    await audioCtx.resume();
  }

  if(source || !buffer) return;

  source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;

  source.connect(audioCtx.destination);
  source.start();
}

/* 停止 */
function stopSound(){
  if(source){
    source.stop();
    source.disconnect();
    source = null;
  }
}
/* ===== 音ここまで ===== */
/* ===== 基本 ===== */
const game=document.getElementById("game");
const dirt=document.getElementById("dirt");
const spray=document.getElementById("spray");
const hose=document.getElementById("hose");
const bar=document.getElementById("bar");
const percent=document.getElementById("percent");

const dCtx=dirt.getContext("2d");
const sCtx=spray.getContext("2d");

let isDown=false;
let flipXFlag=false;
let flipYFlag=false;

/* 吸着 */
const GRIP_X=0.48;
const GRIP_Y=0.42;

/* ノズル */
const NOZZLE_X=0.08;
const NOZZLE_Y=0.08;

/* 初期汚れ */
let totalDirt=0;

/* 画像 */
const img=new Image();
img.src="before.png";

img.onload=()=>{
const rect = game.getBoundingClientRect();

dirt.width  = rect.width;
dirt.height = rect.height;

spray.width  = rect.width;
spray.height = rect.height;

/* 描画も合わせる */
dCtx.drawImage(img, 0, 0, rect.width, rect.height);

  dCtx.drawImage(img,0,0);

  const data=dCtx.getImageData(0,0,dirt.width,dirt.height).data;
  for(let i=3;i<data.length;i+=4){
    if(data[i]>10) totalDirt++;
  }
};

/* ノズル */
function getNozzle(){
  const rect=hose.getBoundingClientRect();
  const gRect=game.getBoundingClientRect();

  let nx=rect.width*NOZZLE_X;
  let ny=rect.height*NOZZLE_Y;

  if(flipXFlag) nx=rect.width-nx;
  if(flipYFlag) ny=rect.height-ny;

  return{
    x:(rect.left-gRect.left+nx)*(dirt.width/gRect.width),
    y:(rect.top -gRect.top +ny)*(dirt.height/gRect.height)
  };
}

/* 水 */
function sprayAll(){

  const n=getNozzle();

  sCtx.clearRect(0,0,spray.width,spray.height);

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  let dx=flipXFlag?1:-1;
  let dy=flipYFlag?1:-1;

  let len=Math.sqrt(dx*dx+dy*dy);
  dx/=len; dy/=len;

  for(let i=0;i<100;i++){

    let spread=(Math.random()-0.5)*0.4;

    let sx=-dy*spread;
    let sy=dx*spread;

    let vx=dx+sx;
    let vy=dy+sy;

    let dist=Math.random()*200;

    let x=n.x+vx*dist;
    let y=n.y+vy*dist;

    sCtx.fillStyle="rgba(255,255,255,0.35)";
    sCtx.fillRect(x,y,2,6);

    dCtx.beginPath();
    dCtx.arc(x,y,12,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();

  updateProgress();
}

/* 進捗 */
function updateProgress(){

  const data=dCtx.getImageData(0,0,dirt.width,dirt.height).data;

  let remainCount=0;
  for(let i=3;i<data.length;i+=4){
    if(data[i]>10) remainCount++;
  }

  let percentVal=Math.ceil((remainCount/totalDirt)*100);

  bar.style.width=percentVal+"%";
  percent.textContent="残り "+percentVal+"%";
}

/* 吸着 */
function moveHose(x,y){

  const gRect=game.getBoundingClientRect();
  const rect=hose.getBoundingClientRect();

  const gx=rect.width*GRIP_X;
  const gy=rect.height*GRIP_Y;

  hose.style.left=(x-gRect.left-gx)+"px";
  hose.style.top =(y-gRect.top -gy)+"px";
}

/* 反転 */
function applyTransform(){
  hose.style.transform=
    `scaleX(${flipXFlag?-1:1}) scaleY(${flipYFlag?-1:1})`;
}

function flipX(){ flipXFlag=!flipXFlag; applyTransform(); }
function flipY(){ flipYFlag=!flipYFlag; applyTransform(); }

/* 操作 */
window.addEventListener("pointerdown",async e=>{
  isDown=true;
  await startSound();
});

window.addEventListener("pointerup",()=>{
  isDown=false;
  stopSound();
});

window.addEventListener("pointermove",e=>{
  if(!isDown) return;

  moveHose(e.clientX,e.clientY);
  sprayAll();
});
</script>

</body>
</html>
