<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  touch-action:none;
}

.game{
  position:relative;
  width:360px;
  aspect-ratio:3/4;
}

.game img,.game canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
}

#bg{z-index:0;}
#clean{z-index:1;}
#dirt{z-index:2;}
#spray{z-index:3;}
#hose{
  z-index:4;
  width:80%;
  position:absolute;
  transform-origin:78% 58%; /* ←ここが超重要 */
}

canvas{touch-action:none;}

#progress{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  height:10px;
  background:#333;
}
#bar{
  height:100%;
  width:0%;
  background:#4fc3f7;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="hose" src="hose.png">
  <div id="progress"><div id="bar"></div></div>
</div>

<audio id="waterSound" src="water.wav" loop></audio>

<script>
const dirt=document.getElementById("dirt");
const spray=document.getElementById("spray");
const clean=document.getElementById("clean");
const hose=document.getElementById("hose");
const bar=document.getElementById("bar");
const sound=document.getElementById("waterSound");

const dCtx=dirt.getContext("2d");
const sCtx=spray.getContext("2d");

let isDown=false;
let angle=0;

// ★ここが調整ポイント
const GRIP_X=0.78;
const GRIP_Y=0.58;
const NOZZLE_DIST=140;

const dirtImg=new Image();
dirtImg.src="before.png";

/* 初期化 */
function init(){
  const w=clean.naturalWidth;
  const h=clean.naturalHeight;
  dirt.width=w;
  dirt.height=h;
  spray.width=w;
  spray.height=h;
  dCtx.drawImage(dirtImg,0,0,w,h);
}

let loaded=0;
function ready(){
  loaded++;
  if(loaded===2) init();
}
clean.onload=ready;
dirtImg.onload=ready;

/* DOM→Canvas */
function domToCanvas(x,y){
  const rect=dirt.getBoundingClientRect();
  return{
    x:(x-rect.left)*(dirt.width/rect.width),
    y:(y-rect.top)*(dirt.height/rect.height)
  };
}

/* グリップ位置（DOM） */
function getGripDom(){
  const rect=hose.getBoundingClientRect();
  return{
    x:rect.left + rect.width*GRIP_X,
    y:rect.top  + rect.height*GRIP_Y
  };
}

/* ノズル位置（Canvas） */
function getNozzleCanvas(){
  const g=getGripDom();
  const c=domToCanvas(g.x,g.y);

  return{
    x:c.x + Math.cos(angle)*NOZZLE_DIST,
    y:c.y + Math.sin(angle)*NOZZLE_DIST
  };
}
/* 扇状削り */
function sprayHit(){
  const n=getNozzleCanvas();

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  for(let i=0;i<15;i++){
    let spread=(Math.random()-0.5)*0.4; // 扇角
    let dir=angle+spread;
    let dist=40 + Math.random()*80;

    let x=n.x + Math.cos(dir)*dist;
    let y=n.y + Math.sin(dir)*dist;

    dCtx.beginPath();
    dCtx.arc(x,y,14,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();
}

/* 水エフェクト（扇状・長め） */
function drawSpray(){
  const n=getNozzleCanvas();
  sCtx.clearRect(0,0,spray.width,spray.height);

  for(let i=0;i<120;i++){
    let spread=(Math.random()-0.5)*0.4;
    let dir=angle+spread;
    let dist=Math.random()*260;

    let x=n.x + Math.cos(dir)*dist;
    let y=n.y + Math.sin(dir)*dist;

    sCtx.fillStyle="rgba(255,255,255,0.35)";
    sCtx.fillRect(x,y,2,6);
  }
}

/* 進捗 */
function updateProgress(){
  const data=dCtx.getImageData(0,0,dirt.width,dirt.height).data;
  let total=data.length/4;
  let clear=0;

  for(let i=3;i<data.length;i+=4){
    if(data[i]===0) clear++;
  }

  bar.style.width=Math.floor(clear/total*100)+"%";
}

/* ホース操作 */
function updateHose(x,y){

  const rect=hose.getBoundingClientRect();
  const gx=rect.width*GRIP_X;
  const gy=rect.height*GRIP_Y;

  // グリップ吸着
  hose.style.left=(x-gx)+"px";
  hose.style.top =(y-gy)+"px";

  // ★修正：グリップ位置を取得
  const grip = getGripDom();

  const dx = x - grip.x;
  const dy = y - grip.y;

  angle = Math.atan2(dy,dx);

  hose.style.transform=`rotate(${angle*180/Math.PI}deg)`;
}
/* タッチ */
dirt.addEventListener("touchstart",(e)=>{
  isDown=true;
  sound.currentTime=0;
  sound.play();
},{passive:false});

dirt.addEventListener("touchend",()=>{
  isDown=false;
  sound.pause();
});

dirt.addEventListener("touchmove",(e)=>{
  e.preventDefault();
  if(!isDown) return;

  const t=e.touches[0];

  updateHose(t.clientX,t.clientY);
  sprayHit();
  drawSpray();
  updateProgress();

},{passive:false});
</script>
</body>
</html>
