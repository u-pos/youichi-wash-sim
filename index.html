<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.game {
  position: relative;
  width: 360px;
  aspect-ratio: 3 / 4;
}

.game img,
.game canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#bg { z-index:0; pointer-events:none; }
#clean { z-index:1; pointer-events:none; }
#dirt { z-index:2; }
#spray { z-index:3; pointer-events:none; }

#hose {
  z-index:4;
  pointer-events:none;
  width: 80%;
  position:absolute;
  transform-origin: 75% 65%; /* ←グリップ位置 */
}

canvas { touch-action:none; }

#progress {
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  height:10px;
  background:#333;
}
#bar {
  height:100%;
  width:0%;
  background:#4fc3f7;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>

  <img id="hose" src="hose.png">

  <div id="progress"><div id="bar"></div></div>
</div>

<audio id="waterSound" src="water.wav" loop></audio>

<script>
const dirt = document.getElementById("dirt");
const spray = document.getElementById("spray");
const clean = document.getElementById("clean");
const bar = document.getElementById("bar");
const hose = document.getElementById("hose");
const sound = document.getElementById("waterSound");

const dCtx = dirt.getContext("2d");
const sCtx = spray.getContext("2d");

let isDown = false;
let power = 14;

const GRIP_X = 0.75;
const GRIP_Y = 0.65;
const NOZZLE_OFFSET = 120;
const SPRAY_OFFSET = 60;

const dirtImg = new Image();
dirtImg.src = "before.png";

function init(){
  const w = clean.naturalWidth;
  const h = clean.naturalHeight;

  dirt.width = w;
  dirt.height = h;
  spray.width = w;
  spray.height = h;

  dCtx.drawImage(dirtImg,0,0,w,h);
}

let loaded = 0;
function ready(){
  loaded++;
  if(loaded===2) init();
}
clean.onload = ready;
dirtImg.onload = ready;

/* タッチ座標 */
function getPos(e){
  const rect = dirt.getBoundingClientRect();
  let x = (e.touches[0].clientX - rect.left) * (dirt.width/rect.width);
  let y = (e.touches[0].clientY - rect.top) * (dirt.height/rect.height);
  return {x,y};
}

/* グリップ位置 */
function getGripPos(){
  const rect = hose.getBoundingClientRect();
  return {
    x: rect.left + rect.width * GRIP_X,
    y: rect.top + rect.height * GRIP_Y
  };
}

/* ノズル位置（角度付き） */
function getNozzlePos(angle){
  const grip = getGripPos();

  return {
    x: grip.x + Math.cos(angle) * NOZZLE_OFFSET,
    y: grip.y + Math.sin(angle) * NOZZLE_OFFSET
  };
}

/* 削り */
function sprayFromNozzle(targetX,targetY,angle){

  const nozzle = getNozzlePos(angle);

  const tx = nozzle.x + Math.cos(angle) * SPRAY_OFFSET;
  const ty = nozzle.y + Math.sin(angle) * SPRAY_OFFSET;

  dCtx.save();
  dCtx.globalCompositeOperation = "destination-out";

  for(let i=0;i<10;i++){
    let x = tx + (Math.random()*20-10);
    let y = ty + (Math.random()*20-10);

    dCtx.beginPath();
    dCtx.arc(x, y, power, 0, Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();
}

/* 水エフェクト */
function drawSpray(angle){

  const nozzle = getNozzlePos(angle);

  sCtx.clearRect(0,0,spray.width,spray.height);

  for(let i=0;i<50;i++){
    let dist = Math.random()*100;

    let x = nozzle.x + Math.cos(angle)*dist + (Math.random()*10-5);
    let y = nozzle.y + Math.sin(angle)*dist + (Math.random()*10-5);

    sCtx.fillStyle = "rgba(255,255,255,0.4)";
    sCtx.fillRect(x,y,2,6);
  }
}

/* 進捗 */
function updateProgress(){
  const data = dCtx.getImageData(0,0,dirt.width,dirt.height).data;
  let total = data.length/4;
  let clear = 0;

  for(let i=3;i<data.length;i+=4){
    if(data[i]===0) clear++;
  }

  let p = Math.floor(clear/total*100);
  bar.style.width = p+"%";

  if(p>95){
    alert("洗浄完了！");
  }
}

/* 回転＋位置追従 */
function updateHose(x,y){

  const rect = hose.getBoundingClientRect();

  const gripX = rect.width * GRIP_X;
  const gripY = rect.height * GRIP_Y;

  hose.style.left = (x - gripX) + "px";
  hose.style.top = (y - gripY) + "px";

  let dx = x - (x - gripX);
  let dy = y - (y - gripY);

  let angle = Math.atan2(dy,dx);

  hose.style.transform = `rotate(${angle*180/Math.PI}deg)`;

  return angle;
}

/* 音 */
function startSound(){
  sound.currentTime = 0;
  sound.play();
}
function stopSound(){
  sound.pause();
}

/* タッチ */
dirt.addEventListener("touchstart",(e)=>{
  isDown=true;
  startSound();
},{passive:false});

dirt.addEventListener("touchend",()=>{
  isDown=false;
  stopSound();
});

dirt.addEventListener("touchmove",(e)=>{
  e.preventDefault();
  if(!isDown) return;

  let p = getPos(e);

  let angle = updateHose(e.touches[0].clientX, e.touches[0].clientY);

  sprayFromNozzle(p.x,p.y,angle);
  drawSpray(angle);
  updateProgress();

},{passive:false});

</script>
</body>
</html>
