<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
  touch-action:none;
  color:#fff;
  font-family:sans-serif;
}

.hud{
  width:360px;
  padding:10px;
}

#gauge{
  width:100%;
  height:10px;
  background:#333;
  border-radius:5px;
  overflow:hidden;
}
#bar{
  height:100%;
  width:100%;
  background:#4fc3f7;
}

.game{
  position:relative;
  width:360px;
  aspect-ratio:3/4;
}

.game img,.game canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
}

#hose{
  position:absolute;
  width:320px;
  left:80px;
  top:100px;
  z-index:4;
}

/* ★ボタン最前面 */
.controls{
  position:absolute;
  top:10px;
  right:10px;
  display:flex;
  gap:5px;
  z-index:9999;
}

button{
  background:#222;
  color:#fff;
  border:none;
  padding:6px 8px;
  border-radius:5px;
}

#clear{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  font-size:24px;
  z-index:9998;
}
</style>
</head>

<body>

<div class="hud">
  <div id="percentText">残り 100%</div>
  <div id="gauge"><div id="bar"></div></div>
</div>

<div class="game" id="game">
  <img src="bg.png">
  <img src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="hose" src="hoseA.png">

  <div class="controls">
    <button onclick="flipY()">上下反転</button>
    <button onclick="flipX()">左右反転</button>
  </div>

  <div id="clear">Mission Complete</div>
</div>

<script>
const game=document.getElementById("game");
const dirt=document.getElementById("dirt");
const spray=document.getElementById("spray");
const hose=document.getElementById("hose");

const bar=document.getElementById("bar");
const text=document.getElementById("percentText");
const clear=document.getElementById("clear");

const dCtx=dirt.getContext("2d");
const sCtx=spray.getContext("2d");

let isDown=false;
let flipXFlag=false;
let flipYFlag=false;
let finished=false;
let lastCheck=0;

let initialDirt=0;

/* ===== 音（確実版） ===== */
/* ===== 音（完全安定版） ===== */
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let buffer = null;
let source = null;

/* ★確実に事前ロード */
window.addEventListener("load", async ()=>{
  const res = await fetch("water.wav");
  const arr = await res.arrayBuffer();
  buffer = await audioCtx.decodeAudioData(arr);
});

/* 再生 */
async function startSound(){

  if(audioCtx.state === "suspended"){
    await audioCtx.resume(); // ←これが最重要
  }

  if(source || !buffer) return;

  source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;

  source.connect(audioCtx.destination);
  source.start(0);
}

/* 停止 */
function stopSound(){
  if(source){
    source.stop();
    source.disconnect();
    source = null;
  }
}

/* 吸着 */
const GRIP_X=0.45;
const GRIP_Y=0.45;

/* ノズル */
const NOZZLE_X=0.08;
const NOZZLE_Y=0.07;

/* 画像 */
const img=new Image();
img.src="before.png";

img.onload=()=>{
  dirt.width=img.width;
  dirt.height=img.height;
  spray.width=img.width;
  spray.height=img.height;
  dCtx.drawImage(img,0,0);

  calculateInitial();
};

/* 初期汚れ */
function calculateInitial(){
  const data=dCtx.getImageData(0,0,dirt.width,dirt.height).data;
  for(let i=3;i<data.length;i+=4){
    if(data[i] > 10) initialDirt++;
  }
}

/* 座標 */
function toGame(x,y){
  const r=game.getBoundingClientRect();
  return {x:x-r.left,y:y-r.top};
}
function toCanvas(x,y){
  const r=dirt.getBoundingClientRect();
  return{
    x:(x-r.left)*(dirt.width/r.width),
    y:(y-r.top)*(dirt.height/r.height)
  };
}

/* ノズル */
function getNozzle(){
  const rect=hose.getBoundingClientRect();

  let nx=rect.width*NOZZLE_X;
  let ny=rect.height*NOZZLE_Y;

  if(flipXFlag) nx=rect.width-nx;
  if(flipYFlag) ny=rect.height-ny;

  return toCanvas(rect.left+nx,rect.top+ny);
}

/* 水 */
function sprayAll(){
  if(finished) return;

  const n=getNozzle();

  sCtx.clearRect(0,0,spray.width,spray.height);

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  let dx = flipXFlag ? 1 : -1;
  let dy = flipYFlag ? 1 : -1;

  let len=Math.sqrt(dx*dx+dy*dy);
  dx/=len; dy/=len;

  for(let i=0;i<100;i++){
    let spread=(Math.random()-0.5)*0.4;

    let sx=-dy*spread;
    let sy=dx*spread;

    let vx=dx+sx;
    let vy=dy+sy;

    let dist=Math.random()*200;

    let x=n.x+vx*dist;
    let y=n.y+vy*dist;

    sCtx.fillStyle="rgba(255,255,255,0.35)";
    sCtx.fillRect(x,y,2,6);

    dCtx.beginPath();
    dCtx.arc(x,y,12,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();

  if(performance.now() - lastCheck > 200){
    updateProgress();
    lastCheck = performance.now();
  }
}

/* 進捗 */
function updateProgress(){

  const data=dCtx.getImageData(0,0,dirt.width,dirt.height).data;

  let current=0;

  for(let i=3;i<data.length;i+=4){
    if(data[i] > 10) current++;
  }

  let remain = Math.ceil((current / initialDirt) * 100);

  if(remain <= 1) remain = 0;

  bar.style.width=remain+"%";
  text.textContent="残り "+remain+"%";

  if(remain === 0 && !finished){
    finished=true;
    clear.style.display="flex";
    stopSound();
  }
}

/* 吸着 */
function moveHose(x,y){
  const p=toGame(x,y);

  const w=hose.offsetWidth;
  const h=hose.offsetHeight;

  hose.style.left=(p.x-w*GRIP_X)+"px";
  hose.style.top =(p.y-h*GRIP_Y)+"px";
}

/* 反転 */
function applyTransform(){
  hose.style.transform=
    `scaleX(${flipXFlag?-1:1}) scaleY(${flipYFlag?-1:1})`;
}

function flipX(){
  flipXFlag=!flipXFlag;
  applyTransform();
}
function flipY(){
  flipYFlag=!flipYFlag;
  applyTransform();
}

/* 操作 */
window.addEventListener("pointerdown",e=>{
  if(finished) return;
  isDown=true;
  startSound();
});
window.addEventListener("pointerup",()=>{
  isDown=false;
  stopSound();
});
window.addEventListener("pointermove",e=>{
  if(!isDown) return;

  moveHose(e.clientX,e.clientY);
  sprayAll();
});
</script>

</body>
</html>
