<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
html,body{
  margin:0;
  background:#111;
  height:100vh;
  overflow:hidden;
  touch-action:none;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
}

.game{
  position:relative;
  width:360px;
  aspect-ratio:3/4;
}

/* 全レイヤー */
.game img,.game canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
}

#bg{z-index:0;}
#clean{z-index:1;}
#dirt{z-index:2;}
#spray{z-index:3;pointer-events:none;}

#hose{
  z-index:4;
  width:340px;
  position:absolute;
  object-fit:contain;

  left:80px;
  top:100px;

  transform-origin:62% 58%;
}

/* ★右上ボタン */
#flipBtn{
  position:absolute;
  top:10px;
  right:10px;
  z-index:10;

  width:70px;
  height:40px;

  border:none;
  border-radius:8px;
  background:#222;
  color:#fff;
  font-size:14px;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="hose" src="hoseA.png">

  <button id="flipBtn" onclick="flip()">反転</button>
</div>

<audio id="waterSound" src="water.wav" loop></audio>

<script>
const dirt=document.getElementById("dirt");
const spray=document.getElementById("spray");
const clean=document.getElementById("clean");
const hose=document.getElementById("hose");
const sound=document.getElementById("waterSound");

const dCtx=dirt.getContext("2d");
const sCtx=spray.getContext("2d");

let isDown=false;

/* 反転管理 */
let flipped=false;
let angle=0;

/* ★画像基準座標（必要なら微調整） */
const GRIP_X=0.62;
const GRIP_Y=0.58;
const NOZZLE_X=0.18;
const NOZZLE_Y=0.12;

const dirtImg=new Image();
dirtImg.src="before.png";

/* 初期化 */
function init(){
  const w=clean.naturalWidth;
  const h=clean.naturalHeight;
  dirt.width=w;
  dirt.height=h;
  spray.width=w;
  spray.height=h;
  dCtx.drawImage(dirtImg,0,0,w,h);
}

let loaded=0;
function ready(){
  loaded++;
  if(loaded===2) init();
}
clean.onload=ready;
dirtImg.onload=ready;

/* 座標変換 */
function domToCanvas(x,y){
  const rect=dirt.getBoundingClientRect();
  return{
    x:(x-rect.left)*(dirt.width/rect.width),
    y:(y-rect.top)*(dirt.height/rect.height)
  };
}

/* ノズル位置（完全安定版） */
function getNozzle(){
  const rect=hose.getBoundingClientRect();

  const gx = rect.left + rect.width * GRIP_X;
  const gy = rect.top  + rect.height * GRIP_Y;

  const nx = rect.left + rect.width * NOZZLE_X;
  const ny = rect.top  + rect.height * NOZZLE_Y;

  let dx = nx - gx;
  let dy = ny - gy;

  let rx = dx * Math.cos(angle) - dy * Math.sin(angle);
  let ry = dx * Math.sin(angle) + dy * Math.cos(angle);

  return domToCanvas(gx + rx, gy + ry);
}

/* 水＋削り */
function sprayAll(){
  const n=getNozzle();

  sCtx.clearRect(0,0,spray.width,spray.height);

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  for(let i=0;i<120;i++){
    let spread=(Math.random()-0.5)*0.35;
    let dir=angle+spread;
    let dist=Math.random()*240;

    let x=n.x + Math.cos(dir)*dist;
    let y=n.y + Math.sin(dir)*dist;

    sCtx.fillStyle="rgba(255,255,255,0.35)";
    sCtx.fillRect(x,y,2,6);

    dCtx.beginPath();
    dCtx.arc(x,y,12,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();
}

/* ホース吸着 */
function updateHose(x,y){
  const rect=hose.getBoundingClientRect();
  const gx=rect.width*GRIP_X;
  const gy=rect.height*GRIP_Y;

  hose.style.left=(x-gx)+"px";
  hose.style.top =(y-gy)+"px";
}

/* ★反転 */
function flip(){
  flipped = !flipped;
  angle = flipped ? Math.PI : 0;

  hose.style.transform = `rotate(${flipped ? 180 : 0}deg)`;
}

/* タッチ操作 */
dirt.addEventListener("touchstart",(e)=>{
  isDown=true;
  sound.currentTime=0;
  sound.play();
},{passive:false});

dirt.addEventListener("touchend",()=>{
  isDown=false;
  sound.pause();
});

dirt.addEventListener("touchmove",(e)=>{
  e.preventDefault();
  if(!isDown) return;

  const t=e.touches[0];

  updateHose(t.clientX,t.clientY);
  sprayAll();
},{passive:false});
</script>

</body>
</html>
