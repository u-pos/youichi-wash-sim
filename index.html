<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洗浄ゲーム</title>
<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  touch-action: none;
  overscroll-behavior: none;
}

.game {
  position: relative;
  width: 360px;
  aspect-ratio: 3 / 4; /* ←これ追加（縦長） */
  overflow: hidden;
}
#bg { z-index: 0; }
#clean { z-index: 1; }
#dirt { z-index: 2; }
#spray { z-index: 3; }
#progress { z-index: 4; }
  
/* ここが超重要 */
.game img,
.game canvas {
  position: absolute;
  left: 0;
  width: 100%;
  bottom: 0; /* ←ここをtopじゃなくbottomに変更 */
}

  #progress {
    position: absolute;
    bottom: 10px;
    left: 10px;
    right: 10px;
    height: 10px;
    background: #333;
    border-radius: 5px;
    overflow: hidden;
  }
  #bar {
    height: 100%;
    width: 0%;
    background: #4fc3f7;
  }
</style>
</head>
<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>

  <div id="progress"><div id="bar"></div></div>
</div>
<audio id="waterSound" src="water.mp3" preload="auto" loop></audio>
<script>
const waterSound = document.getElementById("waterSound");

// スマホ対策（最初のタッチで再生許可）
window.addEventListener("touchstart", () => {
  waterSound.play().then(() => {
    waterSound.pause();
    waterSound.currentTime = 0;
  }).catch(()=>{});
}, { once: true });

// 押したとき
function startSound() {
  waterSound.currentTime = 0;
  waterSound.play();
}

// 離したとき
function stopSound() {
  waterSound.pause();
}
const dirt = document.getElementById("dirt");
const spray = document.getElementById("spray");
const clean = document.getElementById("clean");
const bar = document.getElementById("bar");

const dCtx = dirt.getContext("2d");
const sCtx = spray.getContext("2d");

let img = new Image();
img.src = "before.png";

let isDown = false;
let radius = 25;

// 位置オフセット（ここで“持ち手位置”調整）
let offsetX = 20;
let offsetY = 20;

Promise.all([
  new Promise(res => clean.onload = res),
  new Promise(res => img.onload = res)
]).then(() => {

  const w = clean.naturalWidth;
  const h = clean.naturalHeight;

  dirt.width = w;
  dirt.height = h;

  spray.width = w;
  spray.height = h;

  dCtx.clearRect(0, 0, w, h);
  dCtx.drawImage(img, 0, 0, w, h);

});

// タッチ・マウス統一
function getPos(e) {
  const rect = dirt.getBoundingClientRect();
  let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  let y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

  // スケール補正
  x *= dirt.width / rect.width;
  y *= dirt.height / rect.height;

  return { x, y };
}

function erase(x, y) {
  dCtx.save();

  dCtx.globalCompositeOperation = "destination-out";

  dCtx.beginPath();
  dCtx.arc(x + offsetX, y + offsetY, radius, 0, Math.PI * 2);
  dCtx.fill();

  dCtx.restore();
}

function drawSpray(x, y) {
  sCtx.clearRect(0, 0, spray.width, spray.height);

  sCtx.globalCompositeOperation = "source-over"; // ←重要

  let sx = x + offsetX;
  let sy = y + offsetY;

  let g = sCtx.createRadialGradient(sx, sy, 0, sx, sy, radius);
  g.addColorStop(0, "rgba(255,255,255,0.6)");
  g.addColorStop(1, "rgba(255,255,255,0)");

  sCtx.fillStyle = g;
  sCtx.beginPath();
  sCtx.arc(sx, sy, radius, 0, Math.PI * 2);
  sCtx.fill();
}
function updateProgress() {
  const pixels = dCtx.getImageData(0, 0, dirt.width, dirt.height).data;
  let total = pixels.length / 4;
  let clear = 0;

  for (let i = 3; i < pixels.length; i += 4) {
    if (pixels[i] === 0) clear++;
  }

  let percent = Math.floor((clear / total) * 100);
  bar.style.width = percent + "%";
}

// イベント
["mousedown","touchstart"].forEach(e=>{
  dirt.addEventListener(e, ()=>{
    isDown = true;
    startSound(); // ←追加
  });
});

["mouseup","touchend"].forEach(e=>{
  window.addEventListener(e, ()=>{
    isDown = false;
    stopSound(); // ←追加
  });
});

["mousemove","touchmove"].forEach(e=>{
dirt.addEventListener(e, ev=>{
  ev.preventDefault(); // ←最初に移動

  if (!isDown) return;

  let {x,y} = getPos(ev);

  erase(x,y);
  drawSpray(x,y);
  updateProgress();
}, { passive:false });
</script>

</body>
</html>
