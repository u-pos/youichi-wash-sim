<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.game {
  position: relative;
  width: 360px;
  aspect-ratio: 3 / 4;
}

.game img,
.game canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#bg { z-index:0; pointer-events:none; }
#clean { z-index:1; pointer-events:none; }
#dirt { z-index:2; }
#spray { z-index:3; pointer-events:none; }

#hose {
  z-index:4;
  pointer-events:none;
  width: 55%;
  right: -20%;
  bottom: -10%;
  position:absolute;
  transform-origin: 10% 50%;
}

canvas { touch-action:none; }

#progress {
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  height:10px;
  background:#333;
}
#bar {
  height:100%;
  width:0%;
  background:#4fc3f7;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>

  <img id="hose" src="hose.png">

  <div id="progress"><div id="bar"></div></div>
</div>

<audio id="waterSound" src="water.wav" loop></audio>

<script>
const dirt = document.getElementById("dirt");
const spray = document.getElementById("spray");
const clean = document.getElementById("clean");
const bar = document.getElementById("bar");
const hose = document.getElementById("hose");
const sound = document.getElementById("waterSound");

const dCtx = dirt.getContext("2d");
const sCtx = spray.getContext("2d");

let isDown = false;
let power = 16;

const dirtImg = new Image();
dirtImg.src = "before.png";

function init(){
  const w = clean.naturalWidth;
  const h = clean.naturalHeight;

  dirt.width = w;
  dirt.height = h;
  spray.width = w;
  spray.height = h;

  dCtx.drawImage(dirtImg,0,0,w,h);
}

let loaded = 0;
function ready(){
  loaded++;
  if(loaded===2) init();
}
clean.onload = ready;
dirtImg.onload = ready;

/* タッチ座標 */
function getPos(e){
  const rect = dirt.getBoundingClientRect();
  let x = (e.touches[0].clientX - rect.left) * (dirt.width/rect.width);
  let y = (e.touches[0].clientY - rect.top) * (dirt.height/rect.height);
  return {x,y};
}

/* ノズル位置 */
function getNozzlePos(){
  const rect = hose.getBoundingClientRect();
  return {
    x: rect.left + rect.width * 0.08,
    y: rect.top + rect.height * 0.5
  };
}

/* 削り（ノズル→方向） */
function sprayFromNozzle(targetX,targetY){

  const nozzle = getNozzlePos();

  let dx = targetX - nozzle.x;
  let dy = targetY - nozzle.y;

  let len = Math.sqrt(dx*dx + dy*dy) || 1;
  dx /= len;
  dy /= len;

  dCtx.save();
  dCtx.globalCompositeOperation = "destination-out";

  for(let i=0;i<10;i++){
    let dist = Math.random()*60;

    let x = nozzle.x + dx*dist + (Math.random()*10-5);
    let y = nozzle.y + dy*dist + (Math.random()*10-5);

    dCtx.beginPath();
    dCtx.arc(x, y, power, 0, Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();
}

/* 水エフェクト */
function drawSpray(targetX,targetY){

  const nozzle = getNozzlePos();

  let dx = targetX - nozzle.x;
  let dy = targetY - nozzle.y;

  let len = Math.sqrt(dx*dx + dy*dy) || 1;
  dx /= len;
  dy /= len;

  sCtx.clearRect(0,0,spray.width,spray.height);

  for(let i=0;i<60;i++){
    let dist = Math.random()*100;

    let x = nozzle.x + dx*dist + (Math.random()*10-5);
    let y = nozzle.y + dy*dist + (Math.random()*10-5);

    sCtx.fillStyle = "rgba(255,255,255,0.35)";
    sCtx.fillRect(x, y, 2, 6);
  }
}

/* 進捗 */
function updateProgress(){
  const data = dCtx.getImageData(0,0,dirt.width,dirt.height).data;
  let total = data.length/4;
  let clear = 0;

  for(let i=3;i<data.length;i+=4){
    if(data[i]===0) clear++;
  }

  let p = Math.floor(clear/total*100);
  bar.style.width = p+"%";

  if(p>95){
    alert("洗浄完了！");
  }
}

/* 回転 */
function rotateHose(x,y){
  const nozzle = getNozzlePos();

  let dx = x - nozzle.x;
  let dy = y - nozzle.y;

  let angle = Math.atan2(dy,dx) * 180/Math.PI;
  hose.style.transform = `rotate(${angle}deg)`;
}

/* 音 */
function startSound(){
  sound.currentTime = 0;
  sound.play();
}
function stopSound(){
  sound.pause();
}

/* タッチ */
dirt.addEventListener("touchstart",(e)=>{
  isDown=true;
  startSound();
},{passive:false});

dirt.addEventListener("touchend",()=>{
  isDown=false;
  stopSound();
});

dirt.addEventListener("touchmove",(e)=>{
  e.preventDefault();
  if(!isDown) return;

  let p = getPos(e);

  sprayFromNozzle(p.x,p.y);
  drawSpray(p.x,p.y);
  updateProgress();

  rotateHose(e.touches[0].clientX,e.touches[0].clientY);

},{passive:false});

</script>
</body>
</html>
