<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  touch-action:none;
}

.game{
  position:relative;
  width:360px;
  aspect-ratio:3/4;
}

.game img,.game canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
}

#bg{z-index:0; pointer-events:none;}
#clean{z-index:1; pointer-events:none;}
#dirt{z-index:2;}
#spray{z-index:3; pointer-events:none;}

#hose{
  z-index:4;
  width:80%;
  position:absolute;
  pointer-events:none;
  object-fit:contain;

  left:80px;
  top:80px;

  transform-origin:78% 58%;
}

canvas{touch-action:none;}

#progress{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  height:10px;
  background:#333;
}
#bar{
  height:100%;
  width:0%;
  background:#4fc3f7;
}

/* ▼操作ボタン */
.controls{
  position:absolute;
  bottom:50px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  z-index:10;
}

.controls button{
  width:50px;
  height:50px;
  font-size:20px;
  border:none;
  border-radius:8px;
  background:#222;
  color:#fff;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="hose" src="hose.png">

  <div id="progress"><div id="bar"></div></div>

  <!-- ▼回転ボタン -->
  <div class="controls">
    <button onclick="rotate(-90)">←</button>
    <button onclick="rotate(180)">↓</button>
    <button onclick="rotate(90)">→</button>
    <button onclick="rotate(0)">↑</button>
  </div>
</div>

<audio id="waterSound" src="water.wav" loop></audio>

<script>
const dirt=document.getElementById("dirt");
const spray=document.getElementById("spray");
const clean=document.getElementById("clean");
const hose=document.getElementById("hose");
const bar=document.getElementById("bar");
const sound=document.getElementById("waterSound");

const dCtx=dirt.getContext("2d");
const sCtx=spray.getContext("2d");

let isDown=false;

/* ▼角度（固定制御） */
let angleDeg=0;
let angle=0;

/* グリップ */
const GRIP_X=0.78;
const GRIP_Y=0.58;

/* ノズル位置（画像ベース） */
function getNozzle(){
  const rect=hose.getBoundingClientRect();

  const nx = rect.left + rect.width * 0.12;
  const ny = rect.top  + rect.height * 0.08;

  return domToCanvas(nx, ny);
}

/* 初期化 */
const dirtImg=new Image();
dirtImg.src="before.png";

function init(){
  const w=clean.naturalWidth;
  const h=clean.naturalHeight;
  dirt.width=w;
  dirt.height=h;
  spray.width=w;
  spray.height=h;
  dCtx.drawImage(dirtImg,0,0,w,h);
}

let loaded=0;
function ready(){
  loaded++;
  if(loaded===2) init();
}
clean.onload=ready;
dirtImg.onload=ready;

/* 座標変換 */
function domToCanvas(x,y){
  const rect=dirt.getBoundingClientRect();
  return{
    x:(x-rect.left)*(dirt.width/rect.width),
    y:(y-rect.top)*(dirt.height/rect.height)
  };
}

/* 水＋削り */
function sprayAll(){
  const n=getNozzle();

  sCtx.clearRect(0,0,spray.width,spray.height);

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  for(let i=0;i<150;i++){
    let spread=(Math.random()-0.5)*0.35;
    let dir=angle+spread;
    let dist=Math.random()*260;

    let x=n.x + Math.cos(dir)*dist;
    let y=n.y + Math.sin(dir)*dist;

    sCtx.fillStyle="rgba(255,255,255,0.35)";
    sCtx.fillRect(x,y,2,6);

    dCtx.beginPath();
    dCtx.arc(x,y,12,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();
}

/* 進捗 */
function updateProgress(){
  const data=dCtx.getImageData(0,0,dirt.width,dirt.height).data;
  let total=data.length/4;
  let clear=0;

  for(let i=3;i<data.length;i+=4){
    if(data[i]===0) clear++;
  }

  bar.style.width=Math.floor(clear/total*100)+"%";
}

/* ホース移動（回転はボタンのみ） */
function updateHose(x,y){
  const rect=hose.getBoundingClientRect();
  const gx=rect.width*GRIP_X;
  const gy=rect.height*GRIP_Y;

  hose.style.left=(x-gx)+"px";
  hose.style.top =(y-gy)+"px";
}

/* ▼回転ボタン */
function rotate(deg){
  angleDeg=deg;
  angle=angleDeg * Math.PI / 180;
  hose.style.transform=`rotate(${angleDeg}deg)`;
}

/* 操作 */
dirt.addEventListener("pointerdown",(e)=>{
  isDown=true;
  sound.currentTime=0;
  sound.play();
});

window.addEventListener("pointerup",()=>{
  isDown=false;
  sound.pause();
});

dirt.addEventListener("pointermove",(e)=>{
  if(!isDown) return;

  updateHose(e.clientX,e.clientY);
  sprayAll();
  updateProgress();
});
</script>
</body>
</html>
