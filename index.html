<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洗浄ゲーム</title>
<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  touch-action: none;
  overscroll-behavior: none;
}

.game {
  position: relative;
  width: 360px;
  aspect-ratio: 3 / 4; /* ←これ追加（縦長） */
  overflow: hidden;
}
#bg { z-index: 0; }
#clean { z-index: 1; }
#dirt { z-index: 2; }
#spray { z-index: 3; }
#progress { z-index: 4; }
  
/* ここが超重要 */
.game img,
.game canvas {
  position: absolute;
  left: 0;
  width: 100%;
  bottom: 0; /* ←ここをtopじゃなくbottomに変更 */
}

  #progress {
    position: absolute;
    bottom: 10px;
    left: 10px;
    right: 10px;
    height: 10px;
    background: #333;
    border-radius: 5px;
    overflow: hidden;
  }
  #bar {
    height: 100%;
    width: 0%;
    background: #4fc3f7;
  }
</style>
</head>
<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>

  <div id="progress"><div id="bar"></div></div>
</div>
<audio id="waterSound" src="water.mp3" preload="auto" loop></audio>
<script>
const dirt = document.getElementById("dirt");
const spray = document.getElementById("spray");
const clean = document.getElementById("clean");
const bar = document.getElementById("bar");
const waterSound = document.getElementById("waterSound");

const dCtx = dirt.getContext("2d");
const sCtx = spray.getContext("2d");

let isDown = false;
let radius = 25;
let offsetX = 20;
let offsetY = 20;

// 画像ロード（確実に）
const dirtImg = new Image();
dirtImg.src = "before.png";

// 初期化
function init() {
  const w = clean.naturalWidth;
  const h = clean.naturalHeight;

  dirt.width = w;
  dirt.height = h;
  spray.width = w;
  spray.height = h;

  // ★ここが重要（必ず汚れを描く）
  dCtx.clearRect(0, 0, w, h);
  dCtx.globalCompositeOperation = "source-over";
  dCtx.drawImage(dirtImg, 0, 0, w, h);
}

// 両方ロード完了で実行
let loaded = 0;
function checkLoaded() {
  loaded++;
  if (loaded === 2) init();
}

clean.onload = checkLoaded;
dirtImg.onload = checkLoaded;

// 座標
function getPos(e) {
  const rect = dirt.getBoundingClientRect();
  let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  let y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

  x *= dirt.width / rect.width;
  y *= dirt.height / rect.height;

  return { x, y };
}

// 削る
function erase(x, y) {
  dCtx.save();
  dCtx.globalCompositeOperation = "destination-out";
  dCtx.beginPath();
  dCtx.arc(x + offsetX, y + offsetY, radius, 0, Math.PI * 2);
  dCtx.fill();
  dCtx.restore();
}

// スプレー
function drawSpray(x, y) {
  sCtx.clearRect(0, 0, spray.width, spray.height);

  let sx = x + offsetX;
  let sy = y + offsetY;

  let g = sCtx.createRadialGradient(sx, sy, 0, sx, sy, radius);
  g.addColorStop(0, "rgba(255,255,255,0.6)");
  g.addColorStop(1, "rgba(255,255,255,0)");

  sCtx.fillStyle = g;
  sCtx.beginPath();
  sCtx.arc(sx, sy, radius, 0, Math.PI * 2);
  sCtx.fill();
}

// 進捗
function updateProgress() {
  const pixels = dCtx.getImageData(0, 0, dirt.width, dirt.height).data;
  let total = pixels.length / 4;
  let clear = 0;

  for (let i = 3; i < pixels.length; i += 4) {
    if (pixels[i] === 0) clear++;
  }

  let percent = Math.floor((clear / total) * 100);
  bar.style.width = percent + "%";

  if (percent > 95) {
    alert("洗浄完了！");
  }
}

// 音
function startSound() {
  waterSound.currentTime = 0;
  waterSound.play();
}
function stopSound() {
  waterSound.pause();
}

// イベント
["mousedown","touchstart"].forEach(e=>{
  dirt.addEventListener(e, ()=>{
    isDown = true;
    startSound();
  });
});

["mouseup","touchend"].forEach(e=>{
  window.addEventListener(e, ()=>{
    isDown = false;
    stopSound();
  });
});

["mousemove","touchmove"].forEach(e=>{
  dirt.addEventListener(e, ev=>{
    ev.preventDefault();
    if (!isDown) return;

    let {x,y} = getPos(ev);

    erase(x,y);
    drawSpray(x,y);
    updateProgress();
  }, { passive:false });
});

// スクロール防止
document.body.addEventListener("touchmove", e => {
  e.preventDefault();
}, { passive:false });

</script>

</body>
</html>
