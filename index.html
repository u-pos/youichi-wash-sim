<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
  color:#fff;
  touch-action:none;
  overscroll-behavior:none;
}

/* ローディング */
#loading{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  z-index:9999;
}

/* HUD */
.hud{ width:360px; padding:6px; }
#percent{ font-size:28px; font-weight:bold; }
#barWrap{ width:100%; height:8px; background:#333; }
#bar{ height:100%; width:100%; background:#4fc3f7; }

.game{ position:relative; width:360px; height:480px; }

.game img,.game canvas{
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
}

#hose{
  position:absolute;
  width:320px;
  left:80px;
  top:100px;
  z-index:4;
}



#resetBtn{
  position:absolute;
  top:10px;
  left:10px;
  z-index:999;
}

#clearImg{
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  z-index:5;
}
/* 左上リセット（強調） */
#resetBtn{
  position:absolute;
  top:10px;
  left:10px;
  z-index:999;

  padding:10px 16px;
  font-size:16px;
  font-weight:bold;

  background:#2196f3; /* 青 */
  color:#fff;

  border:none;
  border-radius:8px;
}

/* 右上コントロール（縦並び） */
.controls{
  position:absolute;
  top:10px;
  right:10px;
  z-index:999;

  display:flex;
  flex-direction:column; /* ←縦並び */
  gap:12px;              /* ←間隔広め */
}

/* 右上ボタン */
.controls button{
  padding:10px 14px;
  font-size:16px;
  font-weight:bold;

  background:#222;
  color:#fff;

  border:none;
  border-radius:8px;
}

/* クリア後ボタン（超強調） */
#restartBtn{
  position:absolute;
  bottom:-70px;
  left:50%;
  transform:translateX(-50%);
  display:none;
  z-index:10;

  padding:16px 28px;
  font-size:20px;
  font-weight:bold;

  background:#8B4513; /* 茶色 */
  color:#fff;

  border:none;
  border-radius:10px;

  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<div id="loading">Loading...</div>

<audio id="waterSound" src="water1.mp3"></audio>
<audio id="clearSound" src="clear.mp3"></audio>

<div class="hud">
  <div id="percent">残り 100%</div>
  <div id="barWrap"><div id="bar"></div></div>
</div>

<div class="game" id="game">
  <img id="bgImg" src="bg.png">
  <img id="cleanImg" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="hose" src="hoseA.png">

  <img id="clearImg" src="missionclear.png">
  <button id="restartBtn" onclick="restart()">もう一度汚す</button>
  <button id="resetBtn" onclick="restart()">はじめから</button>

  <div class="controls">
    <button onclick="flipY()">上下反転</button>
    <button onclick="flipX()">左右反転</button>
  </div>
</div>

<script>
const loading = document.getElementById("loading");

/* ★画像だけ監視（これが重要） */
const images = [
  "bg.png",
  "clean.png",
  "missionclear.png",
  "hoseA.png",
  "before.png"
];

let loaded = 0;

images.forEach(src=>{
  const img = new Image();
  img.src = src;
  img.onload = ()=>{
    loaded++;

    if(loaded === images.length){
      loading.style.display = "none";
      ready = true;
    }
  };
});

/* ===== ゲーム ===== */

const game=document.getElementById("game");
const dirt=document.getElementById("dirt");
const spray=document.getElementById("spray");
const hose=document.getElementById("hose");

const waterSound = document.getElementById("waterSound");
const clearSound = document.getElementById("clearSound");

const dCtx=dirt.getContext("2d");
const sCtx=spray.getContext("2d");

let isDown=false;
let flipXFlag=false;
let flipYFlag=false;
let finished=false;
let started=false;
let ready=false;

const GRIP_X=0.48;
const GRIP_Y=0.42;
const NOZZLE_X=0.22;
const NOZZLE_Y=0.08;

const bar=document.getElementById("bar");
const percent=document.getElementById("percent");

const baseImg=new Image();
baseImg.src="before.png";

let totalPixels=0;

baseImg.onload=()=>{
  const w=game.clientWidth;
  const h=game.clientHeight;

  dirt.width=w;
  dirt.height=h;
  spray.width=w;
  spray.height=h;

  dCtx.drawImage(baseImg,0,0,w,h);

  const data=dCtx.getImageData(0,0,w,h).data;
  for(let i=3;i<data.length;i+=4){
    if(data[i]>0) totalPixels++;
  }
};

function getNozzle(){
  const rect=hose.getBoundingClientRect();
  const gRect=game.getBoundingClientRect();

  let nx=rect.width*NOZZLE_X;
  let ny=rect.height*NOZZLE_Y;

  if(flipXFlag) nx=rect.width-nx;
  if(flipYFlag) ny=rect.height-ny;

  return{
    x:(rect.left-gRect.left+nx),
    y:(rect.top -gRect.top +ny)
  };
}

function sprayAll(){
  const n=getNozzle();

  sCtx.clearRect(0,0,spray.width,spray.height);

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  let dx=flipXFlag?1:-1;
  let dy=flipYFlag?1:-1;

  let len=Math.sqrt(dx*dx+dy*dy);
  dx/=len; dy/=len;

  for(let i=0;i<100;i++){
    let spread=(Math.random()-0.5)*0.5;
    let sx=-dy*spread;
    let sy=dx*spread;

    let vx=dx+sx;
    let vy=dy+sy;

    let dist=Math.random()*100;

    let x=n.x+vx*dist;
    let y=n.y+vy*dist;

    sCtx.fillStyle="rgba(255,255,255,0.35)";
    sCtx.fillRect(x,y,2,6);

    dCtx.beginPath();
    dCtx.arc(x,y,4,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();
  updateProgress();
}

function updateProgress(){
  const data=dCtx.getImageData(0,0,dirt.width,dirt.height).data;

  let remain=0;
  for(let i=3;i<data.length;i+=4){
    if(data[i]>0) remain++;
  }

  let p=Math.floor(remain/totalPixels*100);

  bar.style.width=p+"%";
  percent.innerText="残り "+p+"%";

  if(p===0 && !finished){
    finished=true;
    document.getElementById("clearImg").style.display="block";
    document.getElementById("restartBtn").style.display="block";

    waterSound.pause();
    clearSound.currentTime=0;
    clearSound.play().catch(()=>{});
  }
}

function moveHose(x,y){
  const gRect=game.getBoundingClientRect();
  const rect=hose.getBoundingClientRect();

  hose.style.left=(x-gRect.left-rect.width*GRIP_X)+"px";
  hose.style.top =(y-gRect.top -rect.height*GRIP_Y)+"px";
}

function applyTransform(){
  hose.style.transform=
    `scaleX(${flipXFlag?-1:1}) scaleY(${flipYFlag?-1:1})`;
}
function flipX(){ flipXFlag=!flipXFlag; applyTransform(); }
function flipY(){ flipYFlag=!flipYFlag; applyTransform(); }

function restart(){
  const w=game.clientWidth;
  const h=game.clientHeight;

  dCtx.clearRect(0,0,dirt.width,dirt.height);
  dCtx.drawImage(baseImg,0,0,w,h);

  sCtx.clearRect(0,0,spray.width,spray.height);

  bar.style.width="100%";
  percent.innerText="残り 100%";

  document.getElementById("clearImg").style.display="none";
  document.getElementById("restartBtn").style.display="none";

  finished=false;
  started=false;

  waterSound.pause();
  waterSound.currentTime=0;
}

window.addEventListener("pointerdown",()=>{
  if(!ready) return;

  isDown=true;

  if(!started){
    started=true;
    waterSound.currentTime=Math.random()*5;
    waterSound.play().catch(()=>{});
  }
});

window.addEventListener("pointerup",()=>{ isDown=false; });

window.addEventListener("pointermove",e=>{
  if(!isDown || finished || !ready) return;

  moveHose(e.clientX,e.clientY);
  sprayAll();
});
</script>

</body>
</html>
