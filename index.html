<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
}

/* ★固定やめる */
body {
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game {
  position:relative;
  width:360px;
  aspect-ratio:3/4;
}

/* ★レイヤー */
.game img, .game canvas {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ★重要：イベント制御 */
#bg, #clean, #spray, #hose {
  pointer-events:none;
}

#dirt {
  pointer-events:auto;
  touch-action:none;
}

/* ホース */
#hose {
  z-index:4;
  width:80%;
  transform-origin:80% 62%;
}

/* 進捗 */
#progress {
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  height:10px;
  background:#333;
}

#bar {
  height:100%;
  width:0%;
  background:#4fc3f7;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="hose" src="hose.png">
  <div id="progress"><div id="bar"></div></div>
</div>

<audio id="water" src="water.wav" loop></audio>

<script>
const dirt = document.getElementById("dirt");
const spray = document.getElementById("spray");
const clean = document.getElementById("clean");
const hose = document.getElementById("hose");
const bar = document.getElementById("bar");
const sound = document.getElementById("water");

const dCtx = dirt.getContext("2d");
const sCtx = spray.getContext("2d");

let isDown = false;
let angle = 0;

const dirtImg = new Image();
dirtImg.src = "before.png";

/* 初期化 */
clean.onload = () => {
  dirt.width = clean.naturalWidth;
  dirt.height = clean.naturalHeight;
  spray.width = clean.naturalWidth;
  spray.height = clean.naturalHeight;
  dCtx.drawImage(dirtImg,0,0);
};

/* 座標 */
function getPos(e){
  const rect = dirt.getBoundingClientRect();
  return {
    x:(e.clientX-rect.left)*(dirt.width/rect.width),
    y:(e.clientY-rect.top)*(dirt.height/rect.height)
  };
}

/* ホース */
function updateHose(e){
  hose.style.left = (e.clientX-120)+"px";
  hose.style.top  = (e.clientY-120)+"px";

  angle = Math.atan2(
    e.clientY - window.innerHeight/2,
    e.clientX - window.innerWidth/2
  );

  hose.style.transform = `rotate(${angle*180/Math.PI}deg)`;
}

/* 削り */
function sprayHit(x,y){
  dCtx.globalCompositeOperation="destination-out";

  for(let i=0;i<10;i++){
    let a = angle + (Math.random()-0.5)*0.3;
    let d = 60 + Math.random()*60;

    let px = x + Math.cos(a)*d;
    let py = y + Math.sin(a)*d;

    dCtx.beginPath();
    dCtx.arc(px,py,12,0,Math.PI*2);
    dCtx.fill();
  }
}

/* 水 */
function drawWater(x,y){
  sCtx.clearRect(0,0,spray.width,spray.height);

  for(let i=0;i<80;i++){
    let a = angle + (Math.random()-0.5)*0.3;
    let d = Math.random()*200;

    let px = x + Math.cos(a)*d;
    let py = y + Math.sin(a)*d;

    sCtx.fillStyle="rgba(255,255,255,0.3)";
    sCtx.fillRect(px,py,2,6);
  }
}

/* 進捗 */
function progress(){
  const data=dCtx.getImageData(0,0,dirt.width,dirt.height).data;
  let clear=0;

  for(let i=3;i<data.length;i+=4){
    if(data[i]===0) clear++;
  }

  bar.style.width=(clear/(data.length/4))*100+"%";
}

/* pointerイベント */
dirt.addEventListener("pointerdown",(e)=>{
  isDown=true;
  sound.play();
});

window.addEventListener("pointerup",()=>{
  isDown=false;
  sound.pause();
});

dirt.addEventListener("pointermove",(e)=>{
  if(!isDown) return;

  const p = getPos(e);

  updateHose(e);
  sprayHit(p.x,p.y);
  drawWater(p.x,p.y);
  progress();
});
</script>

</body>
</html>
