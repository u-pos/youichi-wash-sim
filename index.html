<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>陽一ウォッシュシミュレーター</title>

<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  touch-action:none;
  position:fixed;
  width:100%;
  height:100%;
}
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
}
.game{
  position:relative;
  width:360px;
  aspect-ratio:3/4;
}
.game img,.game canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
}
#bg{z-index:0;}
#clean{z-index:1;}
#dirt{z-index:2;}
#spray{z-index:3;}
#hose{
  z-index:4;
  width:80%;
  transform-origin:80% 62%;
}
#progress{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  height:10px;
  background:#333;
}
#bar{
  height:100%;
  width:0%;
  background:#4fc3f7;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="hose" src="hose.png">
  <div id="progress"><div id="bar"></div></div>
</div>

<audio id="waterSound" src="water.wav" loop></audio>

<script>
const dirt=document.getElementById("dirt");
const spray=document.getElementById("spray");
const clean=document.getElementById("clean");
const hose=document.getElementById("hose");
const bar=document.getElementById("bar");
const sound=document.getElementById("waterSound");

const dCtx=dirt.getContext("2d");
const sCtx=spray.getContext("2d");

let isDown=false;
let angle=0;
let power=14;

// ★ここが重要（調整値）
const GRIP_OFFSET_X=0;
const GRIP_OFFSET_Y=0;
const NOZZLE_DIST=120;

const dirtImg=new Image();
dirtImg.src="before.png";

function init(){
  const w=clean.naturalWidth;
  const h=clean.naturalHeight;
  dirt.width=w;
  dirt.height=h;
  spray.width=w;
  spray.height=h;
  dCtx.drawImage(dirtImg,0,0,w,h);
}

let loaded=0;
function ready(){
  loaded++;
  if(loaded===2) init();
}
clean.onload=ready;
dirtImg.onload=ready;

/* 座標変換 */
function getCanvasPos(e){
  const rect=dirt.getBoundingClientRect();
  return{
    x:(e.clientX-rect.left)*(dirt.width/rect.width),
    y:(e.clientY-rect.top)*(dirt.height/rect.height)
  };
}

/* ノズル */
function getNozzle(x,y){
  return{
    x:x+Math.cos(angle)*NOZZLE_DIST,
    y:y+Math.sin(angle)*NOZZLE_DIST
  };
}

/* 削り */
function sprayFrom(x,y){
  const n=getNozzle(x,y);

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  for(let i=0;i<12;i++){
    let spread=(Math.random()-0.5)*0.3;
    let dir=angle+spread;

    let dist=60+Math.random()*60;

    let px=n.x+Math.cos(dir)*dist;
    let py=n.y+Math.sin(dir)*dist;

    dCtx.beginPath();
    dCtx.arc(px,py,power,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();
}

/* 水 */
function drawSpray(x,y){
  const n=getNozzle(x,y);

  sCtx.clearRect(0,0,spray.width,spray.height);

  for(let i=0;i<100;i++){
    let spread=(Math.random()-0.5)*0.3;
    let dir=angle+spread;

    let dist=Math.random()*240;

    let px=n.x+Math.cos(dir)*dist;
    let py=n.y+Math.sin(dir)*dist;

    sCtx.fillStyle="rgba(255,255,255,0.4)";
    sCtx.fillRect(px,py,2,6);
  }
}

/* 進捗 */
function updateProgress(){
  const data=dCtx.getImageData(0,0,dirt.width,dirt.height).data;
  let total=data.length/4;
  let clear=0;

  for(let i=3;i<data.length;i+=4){
    if(data[i]===0) clear++;
  }

  bar.style.width=Math.floor(clear/total*100)+"%";
}

/* ホース */
function updateHose(e){
  const rect=dirt.getBoundingClientRect();

  const x=e.clientX;
  const y=e.clientY;

  // グリップ吸着
  hose.style.left=(x-rect.left-80)+"px";
  hose.style.top=(y-rect.top-80)+"px";

  // 角度
  angle=Math.atan2(y-window.innerHeight/2,x-window.innerWidth/2);
  hose.style.transform=`rotate(${angle*180/Math.PI}deg)`;

  return getCanvasPos(e);
}

/* イベント */
dirt.addEventListener("touchstart",(e)=>{
  isDown=true;
  sound.play();
},{passive:false});

dirt.addEventListener("touchend",()=>{
  isDown=false;
  sound.pause();
});

dirt.addEventListener("touchmove",(e)=>{
  e.preventDefault();
  if(!isDown) return;

  const t=e.touches[0];

  const pos=updateHose(t);

  sprayFrom(pos.x,pos.y);
  drawSpray(pos.x,pos.y);
  updateProgress();

},{passive:false});
</script>
</body>
</html>
