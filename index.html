<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.game {
  position: relative;
  width: 360px;
  aspect-ratio: 3 / 4;
}

.game img,
.game canvas {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
}

#bg { z-index: 0; pointer-events:none; }
#clean { z-index: 1; pointer-events:none; }
#dirt { z-index: 2; }
#spray { z-index: 3; pointer-events:none; }

canvas { touch-action: none; }

/* 進捗 */
#progress {
  position: absolute;
  bottom: 10px;
  left: 10px;
  right: 10px;
  height: 10px;
  background: #333;
  border-radius: 5px;
}
#bar {
  height: 100%;
  width: 0%;
  background: #4fc3f7;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>

  <div id="progress"><div id="bar"></div></div>
</div>

<audio id="waterSound" src="water.mp3" preload="auto" loop></audio>

<script>
const dirt = document.getElementById("dirt");
const spray = document.getElementById("spray");
const clean = document.getElementById("clean");
const bar = document.getElementById("bar");
const waterSound = document.getElementById("waterSound");

const dCtx = dirt.getContext("2d");
const sCtx = spray.getContext("2d");

let isDown = false;
let radius = 20;

let prevX = 0;
let prevY = 0;

const dirtImg = new Image();
dirtImg.src = "before.png";

/* 初期化 */
function init() {
  const w = clean.naturalWidth;
  const h = clean.naturalHeight;

  dirt.width = w;
  dirt.height = h;
  spray.width = w;
  spray.height = h;

  dCtx.drawImage(dirtImg, 0, 0, w, h);
}

let loaded = 0;
function ready() {
  loaded++;
  if (loaded === 2) init();
}
clean.onload = ready;
dirtImg.onload = ready;

/* 座標 */
function getPos(e) {
  const rect = dirt.getBoundingClientRect();
  let x = (e.touches[0].clientX - rect.left) * (dirt.width / rect.width);
  let y = (e.touches[0].clientY - rect.top) * (dirt.height / rect.height);
  return {x,y};
}

/* 水で削る（線） */
function sprayLine(x, y, px, py) {
  dCtx.save();
  dCtx.globalCompositeOperation = "destination-out";
  dCtx.lineWidth = radius * 2;
  dCtx.lineCap = "round";

  dCtx.beginPath();
  dCtx.moveTo(px, py);
  dCtx.lineTo(x, y);
  dCtx.stroke();

  dCtx.restore();
}

/* 水エフェクト */
function drawSpray(x, y) {
  sCtx.clearRect(0,0,spray.width,spray.height);

  for (let i = 0; i < 20; i++) {
    sCtx.fillStyle = "rgba(255,255,255,0.2)";
    sCtx.fillRect(
      x + Math.random()*30-15,
      y + Math.random()*30-15,
      2,
      6
    );
  }
}

/* 進捗 */
function updateProgress() {
  const pixels = dCtx.getImageData(0, 0, dirt.width, dirt.height).data;
  let total = pixels.length / 4;
  let clear = 0;

  for (let i = 3; i < pixels.length; i += 4) {
    if (pixels[i] === 0) clear++;
  }

  let percent = Math.floor((clear / total) * 100);
  bar.style.width = percent + "%";

  if (percent > 95) {
    alert("洗浄完了！");
  }
}

/* 音 */
function startSound() {
  waterSound.currentTime = 0;
  waterSound.play();
}
function stopSound() {
  waterSound.pause();
}

/* タッチ操作 */
dirt.addEventListener("touchstart", (e) => {
  isDown = true;
  startSound();

  let {x,y} = getPos(e);
  prevX = x;
  prevY = y;

}, { passive:false });

dirt.addEventListener("touchend", () => {
  isDown = false;
  stopSound();
});

dirt.addEventListener("touchmove", (e) => {
  e.preventDefault();
  if (!isDown) return;

  let {x,y} = getPos(e);

  sprayLine(x, y, prevX, prevY);
  drawSpray(x, y);
  updateProgress();

  prevX = x;
  prevY = y;

}, { passive:false });

</script>

</body>
</html>
