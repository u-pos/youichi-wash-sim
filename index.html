<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.game {
  position: relative;
  width: 360px;
  aspect-ratio: 3 / 4;
}

.game img,
.game canvas {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

#bg { z-index:0; pointer-events:none; }
#clean { z-index:1; pointer-events:none; }
#dirt { z-index:2; }
#spray { z-index:3; pointer-events:none; }

#hose {
  z-index:4;
  pointer-events:none;
  width:80%;
  position:absolute;
  transform-origin: 78% 66%;
}

canvas { touch-action:none; }

#progress {
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  height:10px;
  background:#333;
}
#bar {
  height:100%;
  width:0%;
  background:#4fc3f7;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>

  <img id="hose" src="hose.png">

  <div id="progress"><div id="bar"></div></div>
</div>

<audio id="waterSound" src="water.wav" loop></audio>

<script>
const dirt = document.getElementById("dirt");
const spray = document.getElementById("spray");
const clean = document.getElementById("clean");
const hose = document.getElementById("hose");
const bar = document.getElementById("bar");
const sound = document.getElementById("waterSound");

const dCtx = dirt.getContext("2d");
const sCtx = spray.getContext("2d");

let isDown = false;
let angle = 0;
let power = 14;

const GRIP_X = 0.80;
const GRIP_Y = 0.62;
const NOZZLE_OFFSET = 90;

let lastTouchDist = null;

const dirtImg = new Image();
dirtImg.src = "before.png";

/* 初期化 */
function init(){
  const w = clean.naturalWidth;
  const h = clean.naturalHeight;

  dirt.width = w;
  dirt.height = h;
  spray.width = w;
  spray.height = h;

  dCtx.drawImage(dirtImg,0,0,w,h);
}

let loaded=0;
function ready(){
  loaded++;
  if(loaded===2) init();
}
clean.onload = ready;
dirtImg.onload = ready;

/* 座標 */
function getPos(touch){
  const rect = dirt.getBoundingClientRect();
  return {
    x:(touch.clientX - rect.left)*(dirt.width/rect.width),
    y:(touch.clientY - rect.top)*(dirt.height/rect.height)
  };
}

/* グリップ */
function getGripPos(){
  const rect = hose.getBoundingClientRect();
  return {
    x: rect.left + rect.width * GRIP_X,
    y: rect.top + rect.height * GRIP_Y
  };
}

/* ノズル */
function getNozzlePos(){
  const g = getGripPos();
  return {
    x: g.x + Math.cos(angle)*NOZZLE_OFFSET,
    y: g.y + Math.sin(angle)*NOZZLE_OFFSET
  };
}

/* 削り */
function sprayFromNozzle(){
  const n = getNozzlePos();

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  for(let i=0;i<12;i++){
    let spread=(Math.random()-0.5)*0.35;
    let dir=angle+spread;

    let dist=40+Math.random()*50;

    let x=n.x+Math.cos(dir)*dist;
    let y=n.y+Math.sin(dir)*dist;

    dCtx.beginPath();
    dCtx.arc(x,y,power,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();
}

/* 水 */
function drawSpray(){
  const n=getNozzlePos();
  sCtx.clearRect(0,0,spray.width,spray.height);

  for(let i=0;i<80;i++){
    let spread=(Math.random()-0.5)*0.35;
    let dir=angle+spread;

    let dist=Math.random()*120;

    let x=n.x+Math.cos(dir)*dist;
    let y=n.y+Math.sin(dir)*dist;

    sCtx.fillStyle="rgba(255,255,255,0.35)";
    sCtx.fillRect(x,y,2,6);
  }
}

/* 進捗 */
function updateProgress(){
  const data=dCtx.getImageData(0,0,dirt.width,dirt.height).data;
  let total=data.length/4;
  let clear=0;

  for(let i=3;i<data.length;i+=4){
    if(data[i]===0) clear++;
  }

  let p=Math.floor(clear/total*100);
  bar.style.width=p+"%";
}

/* ホース位置 */
function moveHose(x,y){
  const rect = hose.getBoundingClientRect();

  const gx = rect.width*GRIP_X;
  const gy = rect.height*GRIP_Y;

  hose.style.left=(x-gx)+"px";
  hose.style.top=(y-gy)+"px";

  hose.style.transform=`rotate(${angle*180/Math.PI}deg)`;
}

/* タッチ処理 */
dirt.addEventListener("touchstart",(e)=>{
  isDown=true;
  sound.play();
},{passive:false});

dirt.addEventListener("touchend",()=>{
  isDown=false;
  sound.pause();
  lastTouchDist=null;
});

dirt.addEventListener("touchmove",(e)=>{
  e.preventDefault();

  if(!isDown) return;

  // 1本指 → 移動
  if(e.touches.length===1){
    let t=e.touches[0];
    moveHose(t.clientX,t.clientY);
  }

  // 2本指 → 回転
  if(e.touches.length===2){
    let t1=e.touches[0];
    let t2=e.touches[1];

    let dx=t2.clientX-t1.clientX;
    let dy=t2.clientY-t1.clientY;

    angle=Math.atan2(dy,dx);
  }

  sprayFromNozzle();
  drawSpray();
  updateProgress();

},{passive:false});
</script>
</body>
</html>
