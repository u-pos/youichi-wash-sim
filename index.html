<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陽一ウォッシュシミュレーター</title>

<style>
body{
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  touch-action:none;
}

.game{
  position:relative;
  width:360px;
  aspect-ratio:3/4;
}

.game img,.game canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
}

#bg{z-index:0;}
#clean{z-index:1;}
#dirt{z-index:2;}
#spray{z-index:3;}

#hose{
  z-index:4;
  width:80%;
  position:absolute;
  object-fit:contain;

  left:80px;
  top:80px;

  transform-origin:62% 58%;
}

/* ボタン上 */
.controls{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  z-index:10;
}

.controls button{
  width:50px;
  height:50px;
  font-size:20px;
  border:none;
  border-radius:8px;
  background:#222;
  color:#fff;
}
</style>
</head>

<body>

<div class="game">
  <img id="bg" src="bg.png">
  <img id="clean" src="clean.png">
  <canvas id="dirt"></canvas>
  <canvas id="spray"></canvas>
  <img id="hose" src="hoseA.png">

  <div class="controls">
    <button onclick="rotate(-90)">←</button>
    <button onclick="rotate(180)">↓</button>
    <button onclick="rotate(90)">→</button>
    <button onclick="rotate(0)">↑</button>
  </div>
</div>

<audio id="waterSound" src="water.wav" loop></audio>

<script>
const dirt=document.getElementById("dirt");
const spray=document.getElementById("spray");
const clean=document.getElementById("clean");
const hose=document.getElementById("hose");
const sound=document.getElementById("waterSound");

const dCtx=dirt.getContext("2d");
const sCtx=spray.getContext("2d");

let isDown=false;

/* 回転 */
let angleDeg=0;
let angle=0;

/* ★ここが最重要（画像基準） */
const GRIP_X=0.62;
const GRIP_Y=0.58;

const NOZZLE_X=0.18;
const NOZZLE_Y=0.12;

const dirtImg=new Image();
dirtImg.src="before.png";

/* 初期化 */
function init(){
  const w=clean.naturalWidth;
  const h=clean.naturalHeight;
  dirt.width=w;
  dirt.height=h;
  spray.width=w;
  spray.height=h;
  dCtx.drawImage(dirtImg,0,0,w,h);
}

let loaded=0;
function ready(){
  loaded++;
  if(loaded===2) init();
}
clean.onload=ready;
dirtImg.onload=ready;

/* DOM→Canvas */
function domToCanvas(x,y){
  const rect=dirt.getBoundingClientRect();
  return{
    x:(x-rect.left)*(dirt.width/rect.width),
    y:(y-rect.top)*(dirt.height/rect.height)
  };
}

/* ノズル（回転完全対応） */
function getNozzle(){

  const rect=hose.getBoundingClientRect();

  // グリップ
  const gx = rect.left + rect.width * GRIP_X;
  const gy = rect.top  + rect.height * GRIP_Y;

  // ノズル（元位置）
  const nx = rect.left + rect.width * NOZZLE_X;
  const ny = rect.top  + rect.height * NOZZLE_Y;

  // 相対ベクトル
  let dx = nx - gx;
  let dy = ny - gy;

  // 回転適用
  let rx = dx * Math.cos(angle) - dy * Math.sin(angle);
  let ry = dx * Math.sin(angle) + dy * Math.cos(angle);

  return domToCanvas(gx + rx, gy + ry);
}

/* 水＋削り */
function sprayAll(){

  const n=getNozzle();

  sCtx.clearRect(0,0,spray.width,spray.height);

  dCtx.save();
  dCtx.globalCompositeOperation="destination-out";

  for(let i=0;i<150;i++){

    let spread=(Math.random()-0.5)*0.35;
    let dir=angle+spread;
    let dist=Math.random()*260;

    let x=n.x + Math.cos(dir)*dist;
    let y=n.y + Math.sin(dir)*dist;

    // 水
    sCtx.fillStyle="rgba(255,255,255,0.35)";
    sCtx.fillRect(x,y,2,6);

    // 削り（完全一致）
    dCtx.beginPath();
    dCtx.arc(x,y,12,0,Math.PI*2);
    dCtx.fill();
  }

  dCtx.restore();
}

/* 吸着 */
function updateHose(x,y){

  const rect=hose.getBoundingClientRect();
  const gx=rect.width*GRIP_X;
  const gy=rect.height*GRIP_Y;

  hose.style.left=(x-gx)+"px";
  hose.style.top =(y-gy)+"px";
}

/* 回転 */
function rotate(deg){
  angleDeg=deg;
  angle=deg*Math.PI/180;
  hose.style.transform=`rotate(${deg}deg)`;
}

/* 操作 */
dirt.addEventListener("pointerdown",(e)=>{
  isDown=true;
  sound.currentTime=0;
  sound.play();
});

window.addEventListener("pointerup",()=>{
  isDown=false;
  sound.pause();
});

dirt.addEventListener("pointermove",(e)=>{
  if(!isDown) return;

  updateHose(e.clientX,e.clientY);
  sprayAll();
});
</script>
</body>
</html>
